<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FCKOFF Radio</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&family=VT323&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080808;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'VT323',monospace;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 15% 30%,rgba(255,30,0,.12) 0%,transparent 70%),radial-gradient(ellipse 50% 60% at 85% 70%,rgba(255,210,0,.1) 0%,transparent 70%);pointer-events:none}
.gbg{position:fixed;inset:0;pointer-events:none;overflow:hidden;opacity:.04}
.gbg span{position:absolute;font-family:'Permanent Marker',cursive;color:#fff;user-select:none}
.app{width:480px;display:flex;flex-direction:column;position:relative;z-index:1}
.top{display:flex;align-items:flex-end}
.king{width:200px;flex-shrink:0;margin-bottom:-6px}
.king img{width:100%;display:block;filter:drop-shadow(0 0 20px rgba(255,210,0,.5)) drop-shadow(3px 0 14px rgba(255,30,0,.35))}
.branding{flex:1;padding:0 0 24px 16px;display:flex;flex-direction:column;justify-content:flex-end}
.tag{font-size:12px;color:#ff3a00;letter-spacing:5px;margin-bottom:6px}
.title{font-family:'Permanent Marker',cursive;font-size:54px;line-height:.88;color:#fff;text-shadow:3px 3px 0 #ff3a00,6px 6px 0 rgba(255,58,0,.25)}
.title .f{color:#ffd700;text-shadow:3px 3px 0 #cc7700}
.sub{font-size:16px;color:#444;letter-spacing:4px;margin-top:10px}
.player{background:linear-gradient(160deg,#111,#0a0a0a);border:1px solid #1e1e1e;border-radius:14px;padding:22px 24px;box-shadow:0 24px 64px rgba(0,0,0,.9)}
.lcd{background:#020d02;border:1px solid #0a1a0a;border-radius:8px;padding:12px 16px 10px;margin-bottom:18px;position:relative;overflow:hidden}
.lcd::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.15) 2px,rgba(0,0,0,.15) 4px);pointer-events:none}
.lcd-top{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.dot{width:8px;height:8px;border-radius:50%;background:#1a3a1a;flex-shrink:0;transition:all .4s}
.dot.on{background:#00ff44;box-shadow:0 0 10px #00ff44}
.stat{font-size:20px;color:#005522;letter-spacing:2px;transition:color .3s}
.stat.on{color:#00ff44;text-shadow:0 0 10px rgba(0,255,68,.5)}
.ticker-outer{overflow:hidden;white-space:nowrap;height:18px}
.ticker-inner{display:inline-block;font-size:13px;color:#003311;padding-right:60px}
.ticker-inner.on{color:#009922;animation:tick 32s linear infinite}
@keyframes tick{0%{transform:translateX(480px)}100%{transform:translateX(-100%)}}
.bars{display:flex;align-items:flex-end;gap:4px;height:40px;margin-bottom:20px;justify-content:center}
.bar{width:9px;border-radius:2px 2px 0 0;background:linear-gradient(to top,#cc2200,#ffd700);height:3px;transition:height .09s ease-out}
.controls{display:flex;align-items:center;gap:16px}
.vol-wrap{flex:1;display:flex;align-items:center;gap:10px}
.vol-lbl{font-size:13px;color:#444;letter-spacing:2px;flex-shrink:0}
input[type=range]{-webkit-appearance:none;flex:1;height:5px;background:#1a1a1a;border-radius:3px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#ff3a00;cursor:pointer;box-shadow:0 0 10px rgba(255,58,0,.5)}
.pbtn{width:64px;height:64px;border-radius:50%;border:none;cursor:pointer;font-size:24px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(145deg,#ff3a00,#bb1a00);color:#fff;box-shadow:0 4px 24px rgba(255,58,0,.5);transition:all .15s}
.pbtn:hover{transform:scale(1.07)}
.pbtn:active{transform:scale(.93)}
.pbtn.on{background:linear-gradient(145deg,#ffd700,#aa8800);box-shadow:0 4px 24px rgba(255,215,0,.5)}
</style>
</head>

<script>
(function(){
  // Real verified live streams from Icecast directory (checked live right now)
  // HTTP streams - browser will handle mixed content on HTTPS sites via audio element
  var STREAMS = [
    'http://stream.laut.fm/wiphopbeatz',         // wiphopbeatz - Classic Hip Hop & Boom Bap - LIVE NOW
    'http://ecmanager2.pro-fhi.net:1800/stream', // Remember Sounds Rap & Groove - LIVE NOW playing Luniz
    'http://streaming.coollective.nl:8443/UbuntuFMhiphop', // UbuntuFM HipHop - LIVE NOW
    'http://cupcake.citrus3.com:8186/stream',    // Ketch Radio - 90s hits LIVE
    'http://s01.diazol.hu:9060/stream',          // Radio F.R.S.H. HipHop Soul
    'http://live.playradio.org:9090/UrbanHD'     // Play Urban R&B Hip-Hop
  ];

  var idx = 0, playing = false;
  var au = new Audio();
  au.crossOrigin = 'anonymous';
  au.preload = 'none';

  var pbtn = document.getElementById('pbtn');
  var vol  = document.getElementById('vol');
  var dot  = document.getElementById('dot');
  var stat = document.getElementById('stat');
  var tick = document.getElementById('ticker');

  // bars
  var bars = [], bEl = document.getElementById('bars');
  var maxH = [14,30,20,38,16,42,24,18,46,22,34,17,40,12,28,26,44,15];
  for(var i=0;i<18;i++){
    var b=document.createElement('div'); b.className='bar'; bEl.appendChild(b);
    bars.push({el:b,max:maxH[i],ph:Math.random()*6.28,sp:0.04+Math.random()*0.06});
  }
  var frame=0;
  (function anim(){
    frame++;
    bars.forEach(function(b){
      b.el.style.height=(playing?(3+Math.abs(Math.sin(frame*b.sp+b.ph))*b.max):3)+'px';
    });
    requestAnimationFrame(anim);
  })();

  function setOn(v){
    playing=v;
    pbtn.innerHTML=v?'&#9646;&#9646;':'&#9654;';
    pbtn.classList.toggle('on',v);
    dot.classList.toggle('on',v);
    stat.textContent=v?'ON AIR':'PAUSED';
    stat.classList.toggle('on',v);
    tick.classList.toggle('on',v);
  }

  function tryNext(){
    idx++;
    if(idx>=STREAMS.length){ stat.textContent='NO SIGNAL'; return; }
    stat.textContent='TRYING... ('+(idx+1)+'/'+STREAMS.length+')';
    setTimeout(load, 1200);
  }

  function load(){
    stat.textContent='CONNECTING...';
    au.pause();
    au.src = STREAMS[idx];
    au.volume = parseFloat(vol.value);
    au.load();
    var p = au.play();
    if(p && p.then){
      p.then(function(){ setOn(true); })
       .catch(function(e){ console.warn('Failed:', STREAMS[idx], e.name); tryNext(); });
    }
  }

  pbtn.addEventListener('click', function(){
    if(playing){ au.pause(); setOn(false); }
    else { idx=0; load(); }
  });

  au.addEventListener('playing', function(){ setOn(true); });
  au.addEventListener('error',   function(){ if(!playing) tryNext(); });
  au.addEventListener('stalled', function(){ if(playing) tryNext(); });
  vol.addEventListener('input',  function(){ au.volume=parseFloat(vol.value); });
}());
</script>
